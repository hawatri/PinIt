name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for PinIt? Tell me about it. The more context you can give about *why* you want it, the easier it is to figure out the right shape for the feature.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the solution. "I want to find old notes faster" is more useful than "add a search bar."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Your idea for how to solve it. Mockups or sketches welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways you've thought about solving this, or workarounds you currently use.

  - type: dropdown
    id: note-type
    attributes:
      label: Which note type does this affect?
      multiple: true
      options:
        - All / general
        - Note (rich text)
        - Checklist
        - QR code
        - Link
        - Contact
        - Location
        - App list
        - Image
        - PDF
        - Audio
        - Widgets
        - Backup / Drive sync
        - Notifications
        - Onboarding / settings

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
